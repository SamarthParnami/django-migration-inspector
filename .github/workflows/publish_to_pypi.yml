name: (Pypi) Publish Inspector рЯСЃрЯПљвАНвЩАпЄП distribution рЯУ¶
on:
  workflow-dispatch:
    branches: ['main']

jobs:
  build:
  uses: ./.github/workflows/pacakge_builder.yml

  publish-to-pypi:
    name: Publish distribution рЯУ¶ to PyPI
    needs:
    - build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/${{vars.PACKAGE_NAME}}
    permissions:
      id-token: write  # IMPORTANT: mandatory for trusted publishing

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v3
      with:
        name: ${{vars.PACKAGE_NAME}}
        path: dist/
    - name: Publish distribution рЯУ¶ to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
  
  github-release:
  uses: ./.github/workflows/github_release.yml
  needs:
      - publish-to-pypi