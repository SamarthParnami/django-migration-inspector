name: (Test Pypi) Publish Inspector рЯСЃрЯПљвАНвЩАпЄП distribution рЯУ¶
on:
  workflow_dispatch:
    branches: [alpha]

jobs:
  build:
  uses: ./.github/workflows/pacakge_builder.yml

  publish-to-testpypi:
    name: Publish distribution рЯУ¶ to TestPyPI
    needs:
    - build
    runs-on: ubuntu-latest

    environment:
      name: testpypi
      url: https://test.pypi.org/p/${{vars.PACKAGE_NAME}}

    permissions:
      id-token: write

    steps:
    - name: Download all the dists
      uses: actions/download-artifact@v3
      with:
        name: ${{vars.PACKAGE_NAME}}
        path: dist/
    - name: Publish distribution рЯУ¶ to TestPyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/